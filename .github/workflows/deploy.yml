name: 前端构建并部署方圆智版微服务

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 💡 这里改成了 web 相关的名字
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fyzj-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fyzj-web:v1.${{ github.run_number }}
          # 💡 如果您的前端打包需要 API 地址，可以在这里传入参数
          # build-args: |
          #   NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}


# ==========================================
  # 任务二：SSH 登录海外服务器自动部署 (CD)
  # ==========================================
  deploy:
    name: 自动部署到生产服务器
    needs: build-and-push  # 🚨 关键约束：必须等待上面的打包任务成功后，才执行这里的部署
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH 登录服务器并平滑重启 Docker 容器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }} 
          port: ${{ secrets.SERVER_PORT }}     # 服务器 IP
          username: root                        # 登录用户名
          key: ${{ secrets.SERVER_SSH_KEY }}    # SSH 私钥
          script: |
            echo "🚀 开始自动化部署方圆智版微服务..."
            
            # 1. 切换到服务器上的微服务项目根目录
            cd /opt/1panel/docker/compose/fyzj
            
            # 2. 从 Docker Hub 拉取刚才推送的最新镜像
            docker-compose pull
            
            # 3. 重新创建并启动容器 (没变动的容器会被自动忽略，变动的会平滑重启)
            docker-compose up -d
            
            # 4. 自动化清理虚悬镜像 (Dangling images)，保持服务器磁盘清爽
            docker image prune -f
            
            echo "✅ 自动化部署圆满完成！新版本已上线！"