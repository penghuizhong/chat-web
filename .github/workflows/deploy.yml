name: 前端构建并推送到 Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 💡 这里改成了 web 相关的名字
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fyzj-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fyzj-web:v1.${{ github.run_number }}
          # 💡 如果您的前端打包需要 API 地址，可以在这里传入参数
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.fyzj.online